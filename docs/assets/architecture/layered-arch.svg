<svg viewBox="0 0 560 240" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14">
  <style>
    :root {
      --fg:#1a1a2e; --muted:#6b7280; --bg:#f8f9fc; --card:#ffffff; --border:#e2e8f0;
      --p:#6366f1; --b:#0284c7; --g:#059669; --y:#d97706; --r:#dc2626;
    }
    :root[data-theme="dark"] {
      --fg:#e5e7eb; --muted:#9ca3af; --bg:#1a1a2e; --card:#252540; --border:#3a3a5c;
      --p:#818cf8; --b:#38bdf8; --g:#34d399; --y:#fbbf24; --r:#f87171;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg:#e5e7eb; --muted:#9ca3af; --bg:#1a1a2e; --card:#252540; --border:#3a3a5c; --p:#818cf8; --b:#38bdf8; --g:#34d399; --y:#fbbf24; --r:#f87171; }
    }
    text { fill: var(--fg); }
    .bg  { fill: var(--bg); }
    .layer-label { font-weight: 700; font-size: 14px; }
    .layer-desc  { font-size: 12px; fill: var(--muted); }
    .arrow { stroke: var(--muted); stroke-width: 1.5; fill: none; marker-end: url(#arr); }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--muted)"/>
    </marker>
  </defs>
  <rect width="560" height="240" fill="var(--bg)" rx="8"/>

  <!-- Layer 1: Controller -->
  <rect x="30" y="20" width="320" height="44" rx="6" fill="var(--p)" fill-opacity="0.15" stroke="var(--p)" stroke-width="1.5"/>
  <text x="50" y="47" class="layer-label" fill="var(--p)">Controller（接口层）</text>
  <text x="380" y="47" class="layer-desc">处理 HTTP 请求，参数校验，DTO 转换</text>

  <!-- Arrow -->
  <line x1="190" y1="64" x2="190" y2="76" class="arrow"/>

  <!-- Layer 2: Service -->
  <rect x="30" y="76" width="320" height="44" rx="6" fill="var(--b)" fill-opacity="0.15" stroke="var(--b)" stroke-width="1.5"/>
  <text x="50" y="103" class="layer-label" fill="var(--b)">Service（业务层）</text>
  <text x="380" y="103" class="layer-desc">业务逻辑编排，事务边界</text>

  <!-- Arrow -->
  <line x1="190" y1="120" x2="190" y2="132" class="arrow"/>

  <!-- Layer 3: Repository -->
  <rect x="30" y="132" width="320" height="44" rx="6" fill="var(--g)" fill-opacity="0.15" stroke="var(--g)" stroke-width="1.5"/>
  <text x="50" y="159" class="layer-label" fill="var(--g)">Repository（持久层）</text>
  <text x="380" y="159" class="layer-desc">数据访问，屏蔽 ORM 细节</text>

  <!-- Arrow -->
  <line x1="190" y1="176" x2="190" y2="188" class="arrow"/>

  <!-- Layer 4: Domain -->
  <rect x="30" y="188" width="320" height="40" rx="6" fill="var(--y)" fill-opacity="0.15" stroke="var(--y)" stroke-width="1.5"/>
  <text x="50" y="213" class="layer-label" fill="var(--y)">Domain / Entity</text>
  <text x="380" y="213" class="layer-desc">业务实体，数据模型</text>

  <!-- 依赖方向标注 -->
  <text x="360" y="130" fill="var(--muted)" font-size="11" text-anchor="middle" transform="rotate(-90,355,120)">依赖方向 ↓</text>
</svg>
