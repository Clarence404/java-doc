<svg viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13">
  <style>
    :root {
      --fg:#1a1a2e; --muted:#6b7280; --bg:#f8f9fc; --card:#ffffff; --border:#e2e8f0;
      --p:#6366f1; --b:#0284c7; --g:#059669; --y:#d97706; --r:#dc2626;
    }
    :root[data-theme="dark"] {
      --fg:#e5e7eb; --muted:#9ca3af; --bg:#1a1a2e; --card:#252540; --border:#3a3a5c;
      --p:#818cf8; --b:#38bdf8; --g:#34d399; --y:#fbbf24; --r:#f87171;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg:#e5e7eb; --muted:#9ca3af; --bg:#1a1a2e; --card:#252540; --border:#3a3a5c; --p:#818cf8; --b:#38bdf8; --g:#34d399; --y:#fbbf24; --r:#f87171; }
    }
    text { fill: var(--fg); }
    .title-bar  { fill: var(--p); fill-opacity: 0.2; stroke: var(--p); stroke-width: 1.5; }
    .title-text { fill: var(--p); font-weight: 700; font-size: 15px; }
    .module     { fill: var(--b); fill-opacity: 0.12; stroke: var(--b); stroke-width: 1; }
    .module-alt { fill: var(--g); fill-opacity: 0.12; stroke: var(--g); stroke-width: 1; }
    .infra      { fill: var(--y); fill-opacity: 0.12; stroke: var(--y); stroke-width: 1.5; }
    .mod-text   { font-size: 12px; text-anchor: middle; }
    .outer      { fill: none; stroke: var(--border); stroke-width: 2; }
  </style>

  <rect width="560" height="220" fill="var(--bg)" rx="8"/>

  <!-- 外框 -->
  <rect x="20" y="20" width="520" height="180" rx="8" class="outer"/>

  <!-- 标题栏 -->
  <rect x="20" y="20" width="520" height="36" rx="8" class="title-bar"/>
  <text x="280" y="44" text-anchor="middle" class="title-text">主数据平台</text>

  <!-- Row 1 modules (4 modules) -->
  <rect x="28"  y="60" width="120" height="44" rx="5" class="module"/>
  <text x="88"  y="86" class="mod-text" fill="var(--b)">数据建模</text>

  <rect x="154" y="60" width="120" height="44" rx="5" class="module"/>
  <text x="214" y="86" class="mod-text" fill="var(--b)">数据审批</text>

  <rect x="280" y="60" width="120" height="44" rx="5" class="module"/>
  <text x="340" y="86" class="mod-text" fill="var(--b)">数据获取</text>

  <rect x="406" y="60" width="126" height="44" rx="5" class="module-alt"/>
  <text x="469" y="86" class="mod-text" fill="var(--g)">数据质量控制</text>

  <!-- Row 2 modules (4 modules) -->
  <rect x="28"  y="110" width="120" height="44" rx="5" class="module"/>
  <text x="88"  y="136" class="mod-text" fill="var(--b)">数据同步</text>

  <rect x="154" y="110" width="120" height="44" rx="5" class="module"/>
  <text x="214" y="136" class="mod-text" fill="var(--b)">数据权限</text>

  <rect x="280" y="110" width="120" height="44" rx="5" class="module"/>
  <text x="340" y="136" class="mod-text" fill="var(--b)">数据版本</text>

  <rect x="406" y="110" width="126" height="44" rx="5" class="module-alt"/>
  <text x="469" y="136" class="mod-text" fill="var(--g)">数据集成</text>

  <!-- 基础设施层 -->
  <rect x="28" y="160" width="504" height="32" rx="5" class="infra"/>
  <text x="280" y="181" text-anchor="middle" font-size="12" fill="var(--y)" font-weight="600">缓存层（Redis）+ 数据库（MySQL）</text>
</svg>
