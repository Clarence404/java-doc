<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <title>系统拆分 — 单体到微服务</title>
  <style>
    :root{--fg:#1a1a2e;--muted:#6b7280;--bg:#f8f9fc;--card:#ffffff;--border:#e2e8f0;
          --p:#6366f1;--b:#0284c7;--g:#059669;--r:#dc2626;}
    :root[data-theme="dark"]{--fg:#e5e7eb;--muted:#9ca3af;--bg:#1a1a2e;--card:#252540;
          --border:#3a3a5c;--p:#818cf8;--b:#38bdf8;--g:#34d399;--r:#f87171;}
    @media(prefers-color-scheme:dark){
      :root{--fg:#e5e7eb;--muted:#9ca3af;--bg:#1a1a2e;--card:#252540;--border:#3a3a5c;
            --p:#818cf8;--b:#38bdf8;--g:#34d399;--r:#f87171;}
    }
    text{fill:var(--fg);}
    .muted{fill:var(--muted);}
    .card{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="800" height="320" fill="var(--bg)"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="var(--p)">系统拆分：单体 → 微服务</text>

  <!-- Monolith (left) -->
  <rect x="40" y="50" width="240" height="230" rx="12" fill="var(--r)" opacity="0.08" stroke="var(--r)" stroke-width="2"/>
  <text x="160" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="var(--r)">单体架构</text>
  <text x="160" y="96" text-anchor="middle" font-size="11" class="muted">所有模块打包在一起</text>

  <rect x="62" y="108" width="196" height="28" rx="5" class="card"/>
  <text x="160" y="127" text-anchor="middle" font-size="12">用户模块</text>
  <rect x="62" y="144" width="196" height="28" rx="5" class="card"/>
  <text x="160" y="163" text-anchor="middle" font-size="12">订单模块</text>
  <rect x="62" y="180" width="196" height="28" rx="5" class="card"/>
  <text x="160" y="199" text-anchor="middle" font-size="12">商品模块</text>
  <rect x="62" y="216" width="196" height="28" rx="5" class="card"/>
  <text x="160" y="235" text-anchor="middle" font-size="12">库存模块</text>
  <rect x="62" y="252" width="196" height="22" rx="5" fill="var(--r)" opacity="0.2"/>
  <text x="160" y="267" text-anchor="middle" font-size="11" fill="var(--r)">单点部署 · 局部故障全挂</text>

  <!-- Arrow -->
  <line x1="280" y1="165" x2="360" y2="165" stroke="var(--p)" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="320" y="155" text-anchor="middle" font-size="11" fill="var(--p)">拆分</text>
  <text x="320" y="180" text-anchor="middle" font-size="10" class="muted">按业务域</text>

  <!-- Microservices (right) -->
  <text x="580" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="var(--g)">微服务架构</text>

  <rect x="380" y="74" width="160" height="44" rx="8" fill="var(--g)" opacity="0.12" stroke="var(--g)" stroke-width="1.5"/>
  <text x="460" y="93" text-anchor="middle" font-size="12" fill="var(--g)">用户服务</text>
  <text x="460" y="109" text-anchor="middle" font-size="10" class="muted">独立部署 · 独立扩容</text>

  <rect x="380" y="128" width="160" height="44" rx="8" fill="var(--g)" opacity="0.12" stroke="var(--g)" stroke-width="1.5"/>
  <text x="460" y="147" text-anchor="middle" font-size="12" fill="var(--g)">订单服务</text>
  <text x="460" y="163" text-anchor="middle" font-size="10" class="muted">独立部署 · 独立扩容</text>

  <rect x="560" y="74" width="160" height="44" rx="8" fill="var(--g)" opacity="0.12" stroke="var(--g)" stroke-width="1.5"/>
  <text x="640" y="93" text-anchor="middle" font-size="12" fill="var(--g)">商品服务</text>
  <text x="640" y="109" text-anchor="middle" font-size="10" class="muted">独立部署 · 独立扩容</text>

  <rect x="560" y="128" width="160" height="44" rx="8" fill="var(--g)" opacity="0.12" stroke="var(--g)" stroke-width="1.5"/>
  <text x="640" y="147" text-anchor="middle" font-size="12" fill="var(--g)">库存服务</text>
  <text x="640" y="163" text-anchor="middle" font-size="10" class="muted">独立部署 · 独立扩容</text>

  <!-- Service mesh / registry -->
  <rect x="390" y="192" width="340" height="40" rx="7" fill="var(--b)" opacity="0.1" stroke="var(--b)" stroke-width="1.5"/>
  <text x="560" y="211" text-anchor="middle" font-size="12" fill="var(--b)">服务注册 / 发现 — Nacos / Consul</text>
  <text x="560" y="226" text-anchor="middle" font-size="10" class="muted">服务间通过注册中心相互发现</text>

  <!-- Benefits -->
  <rect x="390" y="248" width="340" height="44" rx="7" fill="var(--p)" opacity="0.08" stroke="var(--p)" stroke-width="1"/>
  <text x="560" y="267" text-anchor="middle" font-size="11" fill="var(--p)">✓ 局部故障不影响整体</text>
  <text x="560" y="284" text-anchor="middle" font-size="11" fill="var(--p)">✓ 按瓶颈服务单独扩容</text>
</svg>
