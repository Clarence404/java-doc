<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <title>多级缓存架构</title>
  <style>
    :root{--fg:#1a1a2e;--muted:#6b7280;--bg:#f8f9fc;--card:#ffffff;--border:#e2e8f0;
          --p:#6366f1;--b:#0284c7;--g:#059669;--y:#d97706;}
    :root[data-theme="dark"]{--fg:#e5e7eb;--muted:#9ca3af;--bg:#1a1a2e;--card:#252540;
          --border:#3a3a5c;--p:#818cf8;--b:#38bdf8;--g:#34d399;--y:#fbbf24;}
    @media(prefers-color-scheme:dark){
      :root{--fg:#e5e7eb;--muted:#9ca3af;--bg:#1a1a2e;--card:#252540;--border:#3a3a5c;
            --p:#818cf8;--b:#38bdf8;--g:#34d399;--y:#fbbf24;}
    }
    text{fill:var(--fg);}
    .muted{fill:var(--muted);}
    .card{fill:var(--card);stroke:var(--border);stroke-width:1.5;}
  </style>
  <defs>
    <marker id="hit" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="#059669"/>
    </marker>
    <marker id="miss" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="800" height="340" fill="var(--bg)"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="var(--y)">多级缓存加速</text>

  <!-- Request -->
  <rect x="330" y="44" width="140" height="40" rx="8" fill="var(--p)"/>
  <text x="400" y="69" text-anchor="middle" font-size="13" font-weight="600" fill="white">用户请求</text>

  <!-- L1 Caffeine -->
  <rect x="160" y="122" width="190" height="66" rx="10" fill="var(--y)" opacity="0.12" stroke="var(--y)" stroke-width="2"/>
  <text x="255" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="var(--y)">L1 — 本地缓存</text>
  <text x="255" y="163" text-anchor="middle" font-size="11" class="muted">Caffeine · 进程内</text>
  <text x="255" y="179" text-anchor="middle" font-size="11" class="muted">微秒级 · 容量小（百MB内）</text>

  <!-- Arrow: request → L1 -->
  <line x1="370" y1="84" x2="290" y2="122" stroke="var(--muted)" stroke-width="1.8" fill="none" marker-end="url(#miss)"/>
  <text x="310" y="106" text-anchor="middle" font-size="10" class="muted">① 查L1</text>

  <!-- L1 hit arrow back -->
  <path d="M255,122 C230,100 330,80 360,84" stroke="var(--g)" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#hit)"/>
  <text x="270" y="100" text-anchor="middle" font-size="10" fill="var(--g)">命中✓</text>

  <!-- L2 Redis -->
  <rect x="380" y="122" width="200" height="66" rx="10" fill="var(--b)" opacity="0.12" stroke="var(--b)" stroke-width="2"/>
  <text x="480" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="var(--b)">L2 — 分布式缓存</text>
  <text x="480" y="163" text-anchor="middle" font-size="11" class="muted">Redis Cluster · 共享</text>
  <text x="480" y="179" text-anchor="middle" font-size="11" class="muted">毫秒级 · 容量大（数GB）</text>

  <!-- L1 miss → L2 -->
  <line x1="350" y1="155" x2="380" y2="155" stroke="var(--muted)" stroke-width="1.8" fill="none" marker-end="url(#miss)"/>
  <text x="365" y="147" text-anchor="middle" font-size="10" class="muted">② L1未中</text>

  <!-- L2 hit arrow back -->
  <path d="M480,122 C460,94 420,84 400,84" stroke="var(--g)" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#hit)"/>
  <text x="448" y="100" text-anchor="middle" font-size="10" fill="var(--g)">命中✓</text>

  <!-- DB -->
  <rect x="300" y="240" width="200" height="60" rx="10" fill="var(--p)" opacity="0.1" stroke="var(--p)" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="var(--p)">数据库（DB）</text>
  <text x="400" y="284" text-anchor="middle" font-size="11" class="muted">MySQL · 毫秒~秒级</text>

  <!-- L2 miss → DB -->
  <line x1="480" y1="188" x2="420" y2="240" stroke="var(--muted)" stroke-width="1.8" fill="none" marker-end="url(#miss)"/>
  <text x="464" y="220" text-anchor="middle" font-size="10" class="muted">③ L2未中 → DB</text>

  <!-- DB → L2 write back -->
  <path d="M380,260 C330,250 330,200 380,188" stroke="var(--g)" stroke-width="1.8" fill="none" stroke-dasharray="5 3" marker-end="url(#hit)"/>
  <text x="316" y="228" text-anchor="middle" font-size="10" fill="var(--g)">回填L2</text>

  <!-- CDN annotation -->
  <rect x="600" y="122" width="168" height="66" rx="10" fill="var(--g)" opacity="0.1" stroke="var(--g)" stroke-width="1.5"/>
  <text x="684" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="var(--g)">CDN</text>
  <text x="684" y="163" text-anchor="middle" font-size="11" class="muted">静态资源就近分发</text>
  <text x="684" y="179" text-anchor="middle" font-size="11" class="muted">图片/JS/CSS</text>

  <!-- Legend -->
  <line x1="40" y1="308" x2="70" y2="308" stroke="var(--g)" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="78" y="313" font-size="11" fill="var(--g)">缓存命中（直接返回）</text>
  <line x1="240" y1="308" x2="270" y2="308" stroke="var(--muted)" stroke-width="2"/>
  <text x="278" y="313" font-size="11" class="muted">缓存未中（继续向下查）</text>
</svg>
